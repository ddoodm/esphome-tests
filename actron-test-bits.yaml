esphome:
  name: actron-test
#   on_boot:
#     priority: -100  # Run after everything is initialised
#     then:
#       - repeat:
#           count: 23
#           then:
#             - remote_transmitter.transmit_raw:
#                 transmitter_id: ac_tx
#                 carrier_frequency: 0Hz
#                 code: [150, -2000, 150, -2000, 150, -2000, 150, -2000,
#                        150, -2000, 150, -2000, 150, -2000, 150, -2000,
#                        150]  # 8 zero bits + trailing pulse

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

api:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

remote_transmitter:
  id: ac_tx
  pin: GPIO5
  carrier_duty_percent: 100%

globals:
  - id: current_cmd
    type: uint8_t
    restore_value: no
    initial_value: '0x60'  # 0b01100000 — framing bits only, system off

# ── Re-send current command every 222ms ──────────────────────────────────────
interval:
  - interval: 222ms
    then:
      - script.execute: tx_frame

# ── Frame transmission script ─────────────────────────────────────────────────
script:
  - id: tx_frame
    then:
      - remote_transmitter.transmit_raw:
          transmitter_id: ac_tx
          carrier_frequency: 0Hz
          code: !lambda |-
            std::vector<int32_t> out;
            uint8_t cmd = id(current_cmd);
            for (int i = 7; i >= 0; i--) {
              out.push_back(150);
              out.push_back(-((cmd >> i) & 1 ? 6000 : 2000));
            }
            out.push_back(150);  // trailing pulse
            return out;

# ── One switch per bit ────────────────────────────────────────────────────────
switch:
  - platform: template
    name: "Bit 7 - FS3"
    optimistic: true
    on_turn_on:
      lambda: id(current_cmd) |= (1 << 7);
    on_turn_off:
      lambda: id(current_cmd) &= ~(1 << 7);

  - platform: template
    name: "Bit 6 - FRAME (always on)"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      lambda: id(current_cmd) |= (1 << 6);
    on_turn_off:
      lambda: id(current_cmd) &= ~(1 << 6);

  - platform: template
    name: "Bit 5 - FRAME (always on)"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      lambda: id(current_cmd) |= (1 << 5);
    on_turn_off:
      lambda: id(current_cmd) &= ~(1 << 5);

  - platform: template
    name: "Bit 4 - COOL_REQ"
    optimistic: true
    on_turn_on:
      lambda: id(current_cmd) |= (1 << 4);
    on_turn_off:
      lambda: id(current_cmd) &= ~(1 << 4);

  - platform: template
    name: "Bit 3 - COMP"
    optimistic: true
    on_turn_on:
      lambda: id(current_cmd) |= (1 << 3);
    on_turn_off:
      lambda: id(current_cmd) &= ~(1 << 3);

  - platform: template
    name: "Bit 2 - FS1"
    optimistic: true
    on_turn_on:
      lambda: id(current_cmd) |= (1 << 2);
    on_turn_off:
      lambda: id(current_cmd) &= ~(1 << 2);

  - platform: template
    name: "Bit 1 - HEAT_REQ"
    optimistic: true
    on_turn_on:
      lambda: id(current_cmd) |= (1 << 1);
    on_turn_off:
      lambda: id(current_cmd) &= ~(1 << 1);

  - platform: template
    name: "Bit 0 - FS2"
    optimistic: true
    on_turn_on:
      lambda: id(current_cmd) |= (1 << 0);
    on_turn_off:
      lambda: id(current_cmd) &= ~(1 << 0);
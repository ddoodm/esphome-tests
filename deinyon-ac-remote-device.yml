substitutions:
  ac_entity_id: climate.actron_test_aircon

esphome:
  name: deinyon-ac-remote
  friendly_name: Deinyon AC Remote

packages:
  ui: !include deinyon-ac-remote-ui.yml

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 16MB

psram:
  mode: octal
  speed: 80MHz

logger:
api:
ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - lambda: 'id(my_rtc).write_time();'
        - logger.log: "Synced RTC to NTP time"
  - platform: pcf85063
    id: my_rtc

sensor:
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    id: wifi_signal_db
    update_interval: 5s

  # ── HA climate state ────────────────────────────────────────────────────────
  - platform: homeassistant
    entity_id: ${ac_entity_id}
    attribute: temperature
    id: ha_setpoint
    on_value:
      then:
        - lambda: |-
            if (std::isnan(x)) return;
            float range = id(g_temp_max) - id(g_temp_min);
            if (range <= 0.0f) return;
            id(g_setpoint) = x;
            int arc_val = (int)((x - id(g_temp_min)) / range * 100.0f);
            arc_val = std::max(0, std::min(100, arc_val));
            id(g_setpoint_arc) = arc_val;
            lv_arc_set_value(id(arc_track), arc_val);
            lv_arc_set_value(id(arc_setpoint), arc_val);
        - script.execute: render_setpoint_label
        - script.execute: update_diff_arc

  - platform: homeassistant
    entity_id: ${ac_entity_id}
    attribute: current_temperature
    id: ha_current_temp
    on_value:
      then:
        - lambda: |-
            if (std::isnan(x)) return;
            float range = id(g_temp_max) - id(g_temp_min);
            if (range <= 0.0f) return;
            id(g_current_temp) = x;
            int arc_val = (int)((x - id(g_temp_min)) / range * 100.0f);
            arc_val = std::max(0, std::min(100, arc_val));
            id(g_current_arc) = arc_val;
            lv_arc_set_value(id(arc_current), arc_val);
        - script.execute: update_diff_arc
        - script.execute: render_current_label

  - platform: homeassistant
    entity_id: ${ac_entity_id}
    attribute: min_temp
    id: ha_min_temp
    on_value:
      then:
        - lambda: 'if (!std::isnan(x)) id(g_temp_min) = x;'

  - platform: homeassistant
    entity_id: ${ac_entity_id}
    attribute: max_temp
    id: ha_max_temp
    on_value:
      then:
        - lambda: 'if (!std::isnan(x)) id(g_temp_max) = x;'

text_sensor:
  # State of the climate entity IS the hvac_mode ("off"/"cool"/"heat"/"heat_cool"/"fan_only")
  - platform: homeassistant
    entity_id: ${ac_entity_id}
    id: ha_hvac_mode
    on_value:
      then:
        - lambda: |-
            int mode = 0;
            if      (x == "cool")      { mode = 1; lv_label_set_text(id(icon_mode), "\U000F0717"); }
            else if (x == "heat")      { mode = 2; lv_label_set_text(id(icon_mode), "\U000F0238"); }
            else if (x == "heat_cool") { mode = 3; lv_label_set_text(id(icon_mode), "\U000F0453"); }
            else if (x == "fan_only")  { mode = 4; lv_label_set_text(id(icon_mode), "\U000F0210"); }
            // "off": leave icon_mode glyph unchanged (shows last active mode)
            id(g_mode) = mode;
            if (mode != 0) id(g_prev_mode) = mode;
        - script.execute: apply_mode_style

  - platform: homeassistant
    entity_id: ${ac_entity_id}
    attribute: hvac_action
    id: ha_hvac_action
    on_value:
      then:
        - lambda: |-
            if      (x == "cooling") { id(g_hvac_action) = 1; }
            else if (x == "heating") { id(g_hvac_action) = 2; }
            else if (x == "fan")     { id(g_hvac_action) = 3; }
            else                     { id(g_hvac_action) = 0; }
        - script.execute: render_action_style

  - platform: homeassistant
    entity_id: ${ac_entity_id}
    attribute: fan_mode
    id: ha_fan_mode
    on_value:
      then:
        - lambda: |-
            if (x == "auto") {
              id(g_fan_auto) = true;
              lv_label_set_text(id(icon_fan), "\U000F0210");
            } else {
              id(g_fan_auto) = false;
              if      (x == "low")    lv_label_set_text(id(icon_fan), "\U000F0BAF");
              else if (x == "medium") lv_label_set_text(id(icon_fan), "\U000F0BB0");
              else if (x == "high")   lv_label_set_text(id(icon_fan), "\U000F0BB1");
            }
            lv_color_t col      = id(g_fan_auto) ? lv_color_hex(id(g_accent_hex)) : lv_color_hex(0x2E2E2E);
            lv_color_t icon_col = id(g_fan_auto) ? lv_color_hex(id(g_accent_hex)) : lv_color_hex(0x777777);
            lv_obj_set_style_border_color(id(btn_fan_auto), col,      LV_STATE_DEFAULT);
            lv_obj_set_style_text_color(id(icon_fan_auto),  icon_col, LV_STATE_DEFAULT);

# Quad SPI bus for display
spi:
  id: quad_spi
  type: quad
  clk_pin: 10
  data_pins: [11, 12, 13, 14]

# Display - SH8601 chip, compatible with RM690B0 driver, 450x600
display:
  - platform: qspi_dbi
    id: my_display
    model: RM690B0
    data_rate: 80MHz
    dimensions:
      width: 450
      height: 600
      offset_width: 16
    brightness: 255
    cs_pin: 9
    reset_pin: 21
    auto_clear_enabled: false
    update_interval: never

# I2C bus (shared by touchscreen, IMU, RTC, extended IO)
i2c:
  id: my_i2c
  sda: 47
  scl: 48
  scan: true

# Touchscreen (FT6336)
touchscreen:
  - platform: ft63x6
    id: my_touchscreen
    display: my_display
    reset_pin: 3
    on_touch:
      then:
        - script.execute: screen_dim

# Extended IO expander (TCA9554 = compatible with PCA9554 driver)
pca9554:
  - id: extio_hub
    address: 0x20

switch:
  - platform: gpio
    pin: 4
    id: vcc_enable
    restore_mode: ALWAYS_ON
    internal: true

  - platform: gpio
    pin: 16
    name: "Battery Enable"

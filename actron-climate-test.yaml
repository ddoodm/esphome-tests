substitutions:
  sensor_desk:     '0'
  sensor_bedroom:  '1'
  sensor_average:  '2'

esphome:
  name: actron-test

# external_components:
  # - source:
  #     type: local
  #     path: components
external_components:
  - source: github://ddoodm/esphome-actron-b812@main
    components: [actron_b812]

# YD-ESP32-23 (VCC-GND Studio) with ESP32-S3-N16R8: 16MB flash, 8MB octal PSRAM.
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

# N16R8 ships with octal PSRAM; GPIO26–GPIO37 are reserved for flash/PSRAM.
psram:
  mode: octal
  speed: 80MHz

api:
time:
  - platform: homeassistant
    id: ha_time
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
ota:
  platform: esphome
logger:
  level: DEBUG

# Onboard WS2812 RGB LED on the YD-ESP32-S3 board is wired to GPIO48.
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    pin: GPIO48
    num_leds: 1
    rmt_symbols: 48
    rgb_order: GRB
    chipset: WS2812
    default_transition_length: 300ms

# GPIO5 is a free GPIO on ESP32-S3 (NOT a strapping pin — strapping pins are
# GPIO0, GPIO3, GPIO45, GPIO46) and is clear of the octal-PSRAM range.
remote_transmitter:
  id: ac_tx
  pin: GPIO5
  carrier_duty_percent: 100%

sensor:
  - platform: homeassistant
    id: desk_temp
    entity_id: sensor.desk_temp_sensor_atc_a199_temperature
    accuracy_decimals: 2
    on_value:
      then:
        - script.execute:
            id: maybe_update_active_temp
            sensor_index: ${sensor_desk}

  - platform: homeassistant
    id: bedroom_temp
    entity_id: sensor.bedroom_temp_sensor_atc_dd1b_temperature
    accuracy_decimals: 2
    on_value:
      then:
        - script.execute:
            id: maybe_update_active_temp
            sensor_index: ${sensor_bedroom}

  - platform: template
    id: active_temp
    lambda: |-
      if (id(active_sensor_idx) == ${sensor_desk})    return id(desk_temp).state;
      if (id(active_sensor_idx) == ${sensor_bedroom}) return id(bedroom_temp).state;
      // Average: sum only sensors with a valid (non-NaN) reading
      float sum = 0; int count = 0;
      auto add = [&](float v) { if (!isnan(v)) { sum += v; count++; } };
      add(id(desk_temp).state);
      add(id(bedroom_temp).state);
      if (count == 0) return NAN;
      return sum / count;
    update_interval: never

globals:
  - id: active_sensor_idx
    type: int
    restore_value: true
    initial_value: ${sensor_desk}

script:
  - id: maybe_update_active_temp
    parameters:
      sensor_index: int
    then:
      - if:
          condition:
            lambda: 'return id(active_sensor_idx) == sensor_index || id(active_sensor_idx) == ${sensor_average};'
          then:
            - component.update: active_temp

select:
  - platform: template
    name: "Thermostat Sensor"
    id: thermostat_sensor_select
    optimistic: true
    restore_value: true
    options:
      - "Desk"
      - "Bedroom"
      - "Average"
    initial_option: "Desk"
    set_action:
      - globals.set:
          id: active_sensor_idx
          value: !lambda |-
            if (x == "Desk")    return ${sensor_desk};
            if (x == "Bedroom") return ${sensor_bedroom};
            return ${sensor_average};
      - component.update: active_temp

climate:
  - platform: actron_b812
    name: "Aircon"
    transmitter_id: ac_tx
    temperature_sensor_id: active_temp
    hysteresis: 0.2         # degrees C, optional — defaults to 0.5
    auto_deadband: 1.0       # degrees C, the gap between heating and cooling in HEAT_COOL mode
    auto_deadband_timeout: 20min  # deadband expires after this long idle; allows response to slow drift
    compressor_cooldown: 4min
    valve_settle_time: 40s
    time_id: ha_time
    compressor_running:
      name: "Aircon Compressor Running"
    state:
      name: "Aircon State"
      on_value:
        then:
          - lambda: |-
              if (x == "cooling" || x == "comp_cooldown") {
                auto call = id(status_led).turn_on();
                call.set_brightness(0.5f);
                call.set_rgb(0.0f, 0.3f, 1.0f);  // blue
                call.perform();
              } else if (x == "heating" || x == "heat_idle" || x == "heat_valve_hold") {
                auto call = id(status_led).turn_on();
                call.set_brightness(0.5f);
                call.set_rgb(1.0f, 0.3f, 0.0f);  // amber/orange
                call.perform();
              } else if (x == "fan_only") {
                auto call = id(status_led).turn_on();
                call.set_brightness(0.2f);
                call.set_rgb(0.2f, 0.8f, 1.0f);  // dim teal-green
                call.perform();
              } else {
                auto call = id(status_led).turn_on();
                call.set_brightness(0.2f);
                call.set_rgb(1.0f, 1.0f, 1.0f);
                call.perform();
              }
    protection_expires_at:
      name: "Aircon Protection Expires At"
    thermostat_direction:
      name: "Aircon Thermostat Direction"
    deadband_active:
      name: "Aircon Deadband Active"
    deadband_expires_at:
      name: "Aircon Deadband Expires At"
    reversing_valve:
      name: "Aircon Reversing Valve"
    call_active:
      name: "Aircon Call Active"
    zone_1:
      name: "Aircon Zone 1"
    zone_2:
      name: "Aircon Zone 2"

esphome:
  name: actron-test

external_components:
  - source:
      type: local
      path: components

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

api:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
ota:
  platform: esphome
logger:
  level: DEBUG

remote_transmitter:
  id: ac_tx
  pin: GPIO5
  carrier_duty_percent: 100%

sensor:
  - platform: homeassistant
    id: room_temp
    entity_id: sensor.desk_temp_sensor_atc_a199_temperature
    accuracy_decimals: 2

climate:
  - platform: actron_b812
    name: "Aircon"
    transmitter_id: ac_tx
    temperature_sensor_id: room_temp
    hysteresis: 0.2         # degrees C, optional — defaults to 0.5
    auto_deadband: 1.0       # degrees C, the gap between heating and cooling in HEAT_COOL mode
    auto_deadband_timeout: 20min  # deadband expires after this long idle; allows response to slow drift
    compressor_cooldown: 4min
    valve_settle_time: 40s
    compressor_running:
      name: "Aircon Compressor Running"
    state:
      name: "Aircon State"
    #   on_value:
    #     then:
    #       - text_sensor.template.publish:
    #           id: ac_state_mirror
    #           state: !lambda 'return x;'
    timer_remaining:
      name: "Aircon Timer Remaining"
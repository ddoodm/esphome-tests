esphome:
  name: actron-test

external_components:
  - source:
      type: local
      path: components

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

api:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
ota:
  platform: esphome
logger:
  level: DEBUG

remote_transmitter:
  id: ac_tx
  pin: GPIO5
  carrier_duty_percent: 100%

climate:
  - platform: actron_b812
    name: "Aircon"
    transmitter_id: ac_tx
    compressor_cooldown: 5s
    valve_settle_time: 5s
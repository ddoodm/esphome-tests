# AC Wall Controller — LVGL UI (PLACEHOLDER)
#
# Real UI will be rewritten from scratch. This file exists only to:
#   1. Provide a minimal LVGL page so the display has something to show.
#   2. Stub the scripts that deinyon-wall-controller.yaml calls
#      (screen_wake, on_active_sensor_changed, on_thermostat_direction_changed,
#       on_hvac_action_changed) so the main config compiles.
#
# Panel native is 1024×600 landscape; LVGL rotation: 90 gives portrait 600×1024.

substitutions:
  # Logical (post-rotation) screen geometry — referenced by future widgets.
  screen_w: "600"
  screen_h: "1024"

# ── Stub scripts ──────────────────────────────────────────────────────────────
# Referenced by the main config's touchscreen, select, and climate handlers.
# Keep these as no-ops until the real UI is wired up.
script:
  - id: screen_wake
    then:
      - lambda: 'return;'

  - id: on_active_sensor_changed
    then:
      - lambda: 'return;'

  - id: on_thermostat_direction_changed
    then:
      - lambda: 'return;'

  - id: on_hvac_action_changed
    then:
      - lambda: 'return;'

# ── Images ────────────────────────────────────────────────────────────────────
image:
  - file: assets/heat.png
    id: heat_bg
    type: RGB565

# ── LVGL ──────────────────────────────────────────────────────────────────────
# rotation: 270 - portrait orientation (600 wide × 1024 tall).
# byte_order: little_endian is required for the P4 7B MIPI-DSI panel.
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touch
  byte_order: little_endian
  rotation: 270
  buffer_size: 25%

  pages:
    - id: main_page
      bg_color: 0x000000
      bg_opa: cover
      bg_image_src: heat_bg
      bg_image_opa: cover
      widgets:
        - label:
            align: CENTER
            y: -20
            text: "AC Wall Controller"
            text_color: 0xFFFFFF
        - label:
            align: CENTER
            y: 20
            text: "UI placeholder"
            text_color: 0x888888

# Shared LVGL UI — included by both host and device configs via packages.
# Both configs must define:
#   - display id: my_display
#   - touchscreen (any platform)
# When wiring real sensors, reference them by ID here and define stubs
# in the host config with matching IDs.

esphome:
  on_boot:
    then:
      - lambda: lv_obj_clear_flag(id(arc_current), LV_OBJ_FLAG_CLICKABLE);

globals:
  - id: g_setpoint_arc
    type: int
    initial_value: '43'

font:
  - file: "gfonts://Roboto"
    id: roboto_regular
    size: 100
  - file: "gfonts://Roboto"
    id: roboto_unit
    size: 24

lvgl:
  displays:
    - my_display
  pages:
    - id: main_page
      bg_color: 0xFFFFFF
      widgets:
        # Arc container — all 4 arcs stacked, same geometry
        - obj:
            align: CENTER
            width: 440
            height: 440
            bg_opa: transp
            border_width: 0
            pad_all: 0
            widgets:

              # Arc 1 — gray track + orange setpoint fill (no knob)
              # start/end angles are defaults (135° → 45°, 270° sweep)
              - arc:
                  id: arc_track
                  adjustable: false
                  min_value: 0
                  max_value: 100
                  value: 43
                  width: 100%
                  height: 100%
                  arc_width: 20
                  indicator:
                    arc_color: 0xFF7A00
                    arc_width: 20
                  knob:
                    bg_opa: transp
                    border_opa: transp

              # Arc 2 — diff segment between current temp and setpoint
              # Trick: background window is set to [current_temp, setpoint] range,
              # value=max so indicator fills the entire window.
              # Initial values: current=21 (19°C), setpoint=43 (22°C) → heating gap
              # angle(v) = 135 + v / 100.0 * 270
              # angle(21) ≈ 192°,  angle(43) ≈ 251°
              - arc:
                  id: arc_diff
                  adjustable: false
                  hidden: false
                  min_value: 0
                  max_value: 100
                  value: 100
                  start_angle: 192
                  end_angle: 251
                  width: 100%
                  height: 100%
                  arc_width: 0
                  indicator:
                    arc_color: 0xCE4000
                    arc_width: 20
                  knob:
                    bg_opa: transp
                    border_opa: transp

              # Arc 3 — current temperature dot (knob only, no visible arc)
              # adjustable: true is required — ESPHome removes knob styles when false.
              # arc_setpoint sits on top and absorbs all touch events, so this
              # arc won't actually be draggable by the user.
              - arc:
                  id: arc_current
                  adjustable: true
                  min_value: 0
                  max_value: 100
                  value: 21
                  width: 100%
                  height: 100%
                  arc_width: 0
                  indicator:
                    arc_width: 20
                    arc_opa: 0%
                  knob:
                    bg_color: 0x000000
                    opa: 45%
                    border_width: 0
                    pad_all: -2

              # Arc 4 — interactive setpoint knob (always on top, drawn last)
              # indicator arc_width=20 aligns knob with the track radius
              - arc:
                  id: arc_setpoint
                  adjustable: true
                  min_value: 0
                  max_value: 100
                  value: 43
                  width: 100%
                  height: 100%
                  arc_width: 0
                  indicator:
                    arc_width: 20
                    arc_opa: 0%
                  knob:
                    bg_color: 0xFFFFFF
                    border_color: 0xFF7A00
                    border_width: 3
                    width: 22
                    height: 22
                  on_value:
                    then:
                      # Capture the arc value into a global so nested lambdas can read it.
                      # Nested action lambdas (e.g. lvgl.label.update text:) run in a
                      # different lambda context where the outer `x` resolves to 0.
                      - globals.set:
                          id: g_setpoint_arc
                          value: !lambda return (int)x;
                      # Keep setpoint fill arc in sync
                      - lvgl.arc.update:
                          id: arc_track
                          value: !lambda return x;
                      # Show diff arc only when setpoint > current (heating gap)
                      # TODO: replace 21 with id(current_temp).state once sensor is wired
                      - if:
                          condition:
                            lambda: return x > 21;
                          then:
                            - lvgl.widget.update:
                                id: arc_diff
                                hidden: false
                            - lvgl.arc.update:
                                id: arc_diff
                                start_angle: !lambda return (int)(135.0f + 21.0f / 100.0f * 270.0f);
                                end_angle: !lambda return (int)(135.0f + (float)id(g_setpoint_arc) / 100.0f * 270.0f);
                          else:
                            - lvgl.widget.update:
                                id: arc_diff
                                hidden: true
                      # Update displayed setpoint value
                      - lvgl.label.update:
                          id: temp_label
                          text: !lambda |-
                            char buf[8];
                            snprintf(buf, sizeof(buf), "%d", id(g_setpoint_arc));
                            return std::string(buf);
                  widgets:
                    - obj:
                        align: CENTER
                        bg_opa: transp
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: FLEX
                          flex_flow: ROW
                          flex_align_main: CENTER
                          flex_align_cross: END
                        widgets:
                          - label:
                              id: temp_label
                              text: "--"
                              text_color: 0xFF7A00
                              text_font: roboto_regular
                          - label:
                              id: unit_label
                              text: "°C"
                              text_color: 0xFF7A00
                              text_font: roboto_unit
                              pad_bottom: 24

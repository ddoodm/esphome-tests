---
# ESPHome config for Waveshare ESP32-P4-WIFI6-Touch-LCD-7B
# 7" 1024x600 capacitive touch display, ESP32-P4 + ESP32-C6 (hosted WiFi).
#
# Hardware references:
#   Schematic: https://files.waveshare.com/wiki/ESP32-P4-WIFI6-Touch-LCD-7B/ESP32-P4-WIFI6-Touch-LCD-7B.pdf
#   Verified config: https://github.com/agillis/esphome-modular-lvgl-buttons
#     /blob/main/hardware/waveshare-esp32-p4-wifi6-touch-lcd-7b.yaml
#
# Flash via the USB-C UART port (NOT the USB-C OTG port).

esphome:
  name: "waveshare-p4-lcd7"
  friendly_name: "Waveshare P4 LCD 7"
  min_version: 2026.4.0

# ── Chip ──────────────────────────────────────────────────────────────────────
# The P4 needs PSRAM execution + experimental IDF features for MIPI-DSI + LVGL.
esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  flash_size: 32MB
  cpu_frequency: 360MHz
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true
      enable_idf_experimental_features: true

# HEX-mode PSRAM at 200 MHz is required for the MIPI-DSI frame buffer.
psram:
  mode: hex
  speed: 200MHz

# Powers the MIPI-DSI PHY. Display will not initialise without it.
esp_ldo:
  - voltage: 2.5V
    channel: 3

preferences:
  flash_write_interval: 5min

logger:
  level: DEBUG
  hardware_uart: UART0
  logs:
    lvgl: INFO

# ── C6 hosted WiFi coprocessor (SDIO) ─────────────────────────────────────────
# The C6 handles all WiFi; the P4 talks to it over SDIO via esp32_hosted.
# Pin map confirmed against the 7B schematic.
esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  active_high: true
  clk_pin: GPIO18
  cmd_pin: GPIO19
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17

# Required for the C6 firmware OTA updater below.
http_request:

# Keeps the C6's ESP-Hosted firmware in sync with the version ESPHome expects.
update:
  - platform: esp32_hosted
    name: "ESP-Hosted Firmware"
    icon: mdi:chip
    type: http
    source: https://esphome.github.io/esp-hosted-firmware/manifest/esp32c6.json
    update_interval: 6h

# ── Network ───────────────────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "P4-LCD7 Fallback"
    password: "esphomep4"

network:
  enable_ipv6: false

# api:
#   encryption:
#     key: !secret api_key

ota:
  - platform: esphome
    # password: !secret ota_password

# ── I2C (touch + audio codec live on the same bus) ────────────────────────────
i2c:
  - id: bus_a
    sda: GPIO7
    scl: GPIO8
    frequency: 400kHz
    scan: true

# ── Touchscreen (GT911) ───────────────────────────────────────────────────────
# The 7B has no GT911 interrupt line wired — reset only.
# mirror_x + mirror_y match the panel's rotation: 180 orientation.
touchscreen:
  - platform: gt911
    id: touch
    i2c_id: bus_a
    reset_pin: GPIO23
    update_interval: 50ms
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    on_touch:
      - lvgl.widget.update:
          id: touch_dot
          hidden: false
          x: !lambda 'return touch.x - 15;'
          y: !lambda 'return touch.y - 15;'
      - lvgl.label.update:
          id: coord_label
          text: !lambda |-
            char buf[32];
            snprintf(buf, sizeof(buf), "x=%d  y=%d", touch.x, touch.y);
            return std::string(buf);
    on_release:
      - lambda: 'id(tap_counter) += 1;'
      - lvgl.label.update:
          id: tap_count_label
          text: !lambda |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Taps: %d", id(tap_counter));
            return std::string(buf);

globals:
  - id: tap_counter
    type: int
    initial_value: '0'
    restore_value: false

# ── Backlight ─────────────────────────────────────────────────────────────────
# GPIO32 is active-low on the 7B, so the LEDC output is inverted.
output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO32
    inverted: true
    frequency: 1000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "Display Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

# ── Display (MIPI DSI) ────────────────────────────────────────────────────────
display:
  - platform: mipi_dsi
    id: main_display
    model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B
    reset_pin:
      number: 33
    dimensions:
      width: 1024
      height: 600
    update_interval: never
    auto_clear_enabled: false

# ── LVGL ──────────────────────────────────────────────────────────────────────
# byte_order: little_endian is required for this panel.
# Change rotation to 90/180/270 to suit the mounting orientation.
lvgl:
  displays:
    - main_display
  touchscreens:
    - touch
  byte_order: little_endian
  rotation: 180
  buffer_size: 25%
  pages:
    - id: main_page
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - label:
            align: CENTER
            text: "Hello from P4!"
            text_font: MONTSERRAT_28
            text_color: 0xFFFFFF
        - label:
            align: CENTER
            y: 60
            id: ip_label
            text: "Connecting..."
            text_font: MONTSERRAT_14
            text_color: 0x888888
        - label:
            id: coord_label
            align: BOTTOM_LEFT
            x: 16
            y: -16
            text: "Touch anywhere..."
            text_font: MONTSERRAT_14
            text_color: 0xAAAAAA
        - label:
            id: tap_count_label
            align: BOTTOM_RIGHT
            x: -16
            y: -16
            text: "Taps: 0"
            text_font: MONTSERRAT_14
            text_color: 0xAAAAAA
        - obj:
            id: touch_dot
            x: 0
            y: 0
            width: 30
            height: 30
            radius: 15
            bg_color: 0xFF8800
            bg_opa: COVER
            border_width: 0
            hidden: true

# Update IP label once WiFi connects.
interval:
  - interval: 5s
    then:
      - lvgl.label.update:
          id: ip_label
          text: !lambda |-
            auto ips = network::get_ip_addresses();
            if (ips.empty()) return std::string("Connecting...");
            return ips[0].str();

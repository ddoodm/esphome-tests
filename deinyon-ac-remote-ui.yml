# deinyon-ac-remote-ui.yml
# Portrait arc, dark theme, 450×600
# Requires: display id my_display, touchscreen (any platform)
# Device must be in portrait orientation (no rotation: 270°)
#
# Arc value mapping: arc_val = (temp_c - g_temp_min) / (g_temp_max - g_temp_min) * 100
#   default range 19–29 °C (actron_b812 visual limits), step 0.5 °C
#   19 °C → 0    22 °C → 30    29 °C → 100
# Initial state: setpoint 22 °C (arc 30), room 21 °C (arc 20)
#
# g_mode: 0=off  1=cool  2=heat  3=auto  4=fan-only
# g_prev_mode: last non-off mode, restored on power-on (default 1=cool)
#
# To wire real climate min/max on boot, replace g_temp_min/max initial_values
# with: id(g_temp_min) = id(my_climate).get_traits().get_min_target_temperature();
#        id(g_temp_max) = id(my_climate).get_traits().get_max_target_temperature();

esphome:
  on_boot:
    then:
      - lambda: |-
          // arc_current knob is for display only — block all touch on it
          lv_obj_clear_flag(id(arc_current), LV_OBJ_FLAG_CLICKABLE);
          // Button press flash: white border instant on press, ease-out decay on release
          static lv_style_prop_t _props[] = {LV_STYLE_BORDER_COLOR, LV_STYLE_PROP_INV};
          static lv_style_transition_dsc_t _t_in, _t_out;
          lv_style_transition_dsc_init(&_t_in,  _props, lv_anim_path_linear,   80,  0, NULL);
          lv_style_transition_dsc_init(&_t_out, _props, lv_anim_path_ease_out, 500, 0, NULL);
          static lv_style_t _s_pressed, _s_default;
          lv_style_init(&_s_pressed);
          lv_style_set_border_color(&_s_pressed, lv_color_hex(0xFFFFFF));
          lv_style_set_transition(&_s_pressed, &_t_in);
          lv_style_init(&_s_default);
          lv_style_set_transition(&_s_default, &_t_out);
          // btn_fan_auto and btn_power are excluded — their border colour is
          // managed by apply_mode_style / fan-auto toggle, so the transition would conflict.
          lv_obj_t *_btns[] = {id(btn_fan), id(btn_mode),
                                id(btn_temp_minus), id(btn_temp_plus)};
          for (int i = 0; i < 4; i++) {
            lv_obj_add_style(_btns[i], &_s_default, LV_STATE_DEFAULT);
            lv_obj_add_style(_btns[i], &_s_pressed, LV_STATE_PRESSED);
          }
      - script.execute: apply_mode_style

globals:
  - id: g_setpoint
    type: float
    initial_value: '22.0'
  - id: g_setpoint_arc
    type: int
    initial_value: '30'
  - id: g_temp_min
    type: float
    initial_value: '19.0'
  - id: g_temp_max
    type: float
    initial_value: '29.0'
  - id: g_current_arc
    type: int
    initial_value: '20'
  - id: g_mode
    type: int
    initial_value: '0'
  - id: g_prev_mode
    type: int
    initial_value: '1'
  - id: g_fan_auto
    type: bool
    initial_value: 'false'
  # Current accent hex — written by apply_mode_style so any lambda can read it
  # without repeating the mode switch. Grey (off) until first mode is set.
  - id: g_accent_hex
    type: uint32_t
    initial_value: '0x444444'

font:
  - file: "gfonts://Roboto"
    id: roboto_96
    size: 96
    glyphs: "0123456789."
  - file: "gfonts://Roboto"
    id: roboto_32
    size: 32
    glyphs: "°C"
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_36
    size: 36
    bpp: 4
    glyphs:
      - "\U000F0425"  # mdi:power
      - "\U000F0717"  # mdi:snowflake   (cool mode)
      - "\U000F0238"  # mdi:fire        (heat mode)
      - "\U000F0453"  # mdi:autorenew   (auto mode / fan auto toggle)
      - "\U000F0210"  # mdi:fan         (fan speed button / fan-only mode)
      - "\U000F0BAF"  # mdi:fan-speed-1 (low)
      - "\U000F0BB0"  # mdi:fan-speed-2 (med)
      - "\U000F0BB1"  # mdi:fan-speed-3 (high)
      - "\U000F0374"  # mdi:minus       (temp −)
      - "\U000F0417"  # mdi:plus        (temp +)

# ── Mode colour script ─────────────────────────────────────────────────────────
# Single source of truth for arc colours, power button, and fan-auto toggle.
# Writes g_accent_hex so the fan-auto toggle lambda can read the current accent
# without duplicating the switch.
# Call whenever g_mode changes: mode button taps, power toggle, boot.
script:
  - id: apply_mode_style
    then:
      - lambda: |-
          lv_color_t track_col, accent_col;
          uint32_t   accent_num;
          bool powered = (id(g_mode) != 0);
          switch (id(g_mode)) {
            case 1: // cool — blue
              track_col  = lv_color_hex(0x003E7A);
              accent_col = lv_color_hex(0x33AAFF);
              accent_num = 0x33AAFF;
              break;
            case 2: // heat — orange-red
              track_col  = lv_color_hex(0x7A2500);
              accent_col = lv_color_hex(0xFF6622);
              accent_num = 0xFF6622;
              break;
            case 3: // auto — peppermint
              track_col  = lv_color_hex(0x006B50);
              accent_col = lv_color_hex(0x00D9A3);
              accent_num = 0x00D9A3;
              break;
            case 4: // fan-only — silver
              track_col  = lv_color_hex(0x333333);
              accent_col = lv_color_hex(0x888888);
              accent_num = 0x888888;
              break;
            default: // off
              track_col  = lv_color_hex(0x1A1A1A);
              accent_col = lv_color_hex(0x444444);
              accent_num = 0x444444;
              break;
          }
          // Publish accent for other lambdas to consume
          id(g_accent_hex) = powered ? accent_num : 0x444444U;
          lv_color_t active_col = lv_color_hex(id(g_accent_hex));

          // ── Arc ────────────────────────────────────────────────────────────
          lv_obj_set_style_arc_opa(id(arc_track),
                                   powered ? LV_OPA_COVER : LV_OPA_TRANSP,
                                   LV_PART_INDICATOR);
          if (powered)
            lv_obj_set_style_arc_color(id(arc_track), track_col, LV_PART_INDICATOR);
          lv_obj_set_style_arc_color(id(arc_diff), active_col, LV_PART_INDICATOR);
          if (!powered) {
            lv_obj_add_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
          } else if (id(g_setpoint_arc) > id(g_current_arc)) {
            lv_arc_set_bg_start_angle(id(arc_diff),
              (int)(135.0f + id(g_current_arc) / 100.0f * 270.0f));
            lv_arc_set_bg_end_angle(id(arc_diff),
              (int)(135.0f + id(g_setpoint_arc) / 100.0f * 270.0f));
            lv_obj_clear_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
          }
          lv_obj_set_style_border_color(id(arc_setpoint), active_col, LV_PART_KNOB);

          // ── Power button ───────────────────────────────────────────────────
          lv_obj_set_style_border_color(id(btn_power),
                                        powered ? active_col : lv_color_hex(0x2E2E2E),
                                        LV_STATE_DEFAULT);
          lv_obj_set_style_text_color(id(icon_power),
                                      powered ? active_col : lv_color_hex(0x777777),
                                      LV_STATE_DEFAULT);

          // ── Fan auto toggle ────────────────────────────────────────────────
          if (id(g_fan_auto)) {
            lv_obj_set_style_border_color(id(btn_fan_auto), active_col, LV_STATE_DEFAULT);
            lv_obj_set_style_text_color(id(icon_fan_auto), active_col, LV_STATE_DEFAULT);
          }

          // ── Fan speed popup icons ──────────────────────────────────────────
          // Use a slightly lighter grey when off so icons remain legible.
          lv_color_t popup_col = powered ? active_col : lv_color_hex(0x666666);
          lv_obj_set_style_text_color(id(icon_fan_pop_low),  popup_col, LV_STATE_DEFAULT);
          lv_obj_set_style_text_color(id(icon_fan_pop_med),  popup_col, LV_STATE_DEFAULT);
          lv_obj_set_style_text_color(id(icon_fan_pop_high), popup_col, LV_STATE_DEFAULT);

lvgl:
  displays:
    - my_display
  pages:
    - id: main_page
      bg_color: 0x000000
      widgets:

        # ── Top button row ─────────────────────────────────────────────────────
        # Fan speed button (top-left, x=15) — icon shows selected speed; always neutral (no active state)
        - button:
            id: btn_fan
            x: 15
            y: 20
            width: 114
            height: 114
            radius: 57
            bg_opa: transp
            border_color: 0x2E2E2E
            border_width: 2
            pad_all: 0
            on_click:
              then:
                - if:
                    condition:
                      lambda: return lv_obj_has_flag(id(fan_popup), LV_OBJ_FLAG_HIDDEN);
                    then:
                      - lvgl.widget.show: fan_popup
                      - lvgl.widget.hide: mode_popup
                      - lvgl.widget.show: popup_backdrop
                    else:
                      - lvgl.widget.hide: fan_popup
                      - lvgl.widget.hide: popup_backdrop
            widgets:
              - label:
                  id: icon_fan
                  align: CENTER
                  text: "\U000F0210"
                  text_font: mdi_36
                  text_color: 0x777777

        # Fan auto toggle (x=141) — highlights in current mode accent when active
        - button:
            id: btn_fan_auto
            x: 141
            y: 20
            width: 114
            height: 114
            radius: 57
            bg_opa: transp
            border_color: 0x2E2E2E
            border_width: 2
            pad_all: 0
            on_click:
              then:
                - lambda: |-
                    id(g_fan_auto) = !id(g_fan_auto);
                    if (id(g_fan_auto)) {
                      lv_color_t col = lv_color_hex(id(g_accent_hex));
                      lv_obj_set_style_border_color(id(btn_fan_auto), col, LV_STATE_DEFAULT);
                      lv_obj_set_style_text_color(id(icon_fan_auto),  col, LV_STATE_DEFAULT);
                    } else {
                      lv_obj_set_style_border_color(id(btn_fan_auto), lv_color_hex(0x2E2E2E), LV_STATE_DEFAULT);
                      lv_obj_set_style_text_color(id(icon_fan_auto),  lv_color_hex(0x777777), LV_STATE_DEFAULT);
                    }
            widgets:
              - label:
                  id: icon_fan_auto
                  align: CENTER
                  text: "\U000F0453"
                  text_font: mdi_36
                  text_color: 0x777777

        # Mode button (top-right, x=321) — icon glyph updates to selected mode; always neutral (no active state)
        - button:
            id: btn_mode
            x: 321
            y: 20
            width: 114
            height: 114
            radius: 57
            bg_opa: transp
            border_color: 0x2E2E2E
            border_width: 2
            pad_all: 0
            on_click:
              then:
                - if:
                    condition:
                      lambda: return lv_obj_has_flag(id(mode_popup), LV_OBJ_FLAG_HIDDEN);
                    then:
                      - lvgl.widget.show: mode_popup
                      - lvgl.widget.hide: fan_popup
                      - lvgl.widget.show: popup_backdrop
                    else:
                      - lvgl.widget.hide: mode_popup
                      - lvgl.widget.hide: popup_backdrop
            widgets:
              - label:
                  id: icon_mode
                  align: CENTER
                  text: "\U000F0717"
                  text_font: mdi_36
                  text_color: 0x777777

        # ── Arc area: 330×330, centered horizontally at y=155 ─────────────────
        # All arcs share the same container and geometry (100% × 100%).
        - obj:
            align: TOP_MID
            y: 155
            width: 330
            height: 330
            bg_opa: transp
            border_width: 0
            pad_all: 0
            scrollable: false
            widgets:

              # Arc 1 — dark-gray background ring + mode-coloured setpoint indicator.
              # Indicator opa starts at 0% (off state); apply_mode_style reveals it on power-on.
              - arc:
                  id: arc_track
                  adjustable: false
                  min_value: 0
                  max_value: 100
                  value: 30
                  width: 100%
                  height: 100%
                  arc_color: 0x1A1A1A
                  arc_width: 32
                  indicator:
                    arc_color: 0x006B50
                    arc_width: 32
                    arc_opa: 0%
                  knob:
                    bg_opa: transp
                    border_opa: transp

              # Arc 2 — bright accent diff segment (current temp → setpoint gap).
              # Starts hidden; apply_mode_style / on_value show it when powered and setpoint > current.
              - arc:
                  id: arc_diff
                  adjustable: false
                  hidden: true
                  min_value: 0
                  max_value: 100
                  value: 100
                  start_angle: 189
                  end_angle: 216
                  width: 100%
                  height: 100%
                  arc_width: 0
                  indicator:
                    arc_color: 0x444444
                    arc_width: 32
                  knob:
                    bg_opa: transp
                    border_opa: transp

              # Arc 3 — current temperature dot marker (not interactive).
              # adjustable: true required for LVGL to keep knob styled.
              # LV_OBJ_FLAG_CLICKABLE cleared on boot so it won't capture touch.
              - arc:
                  id: arc_current
                  adjustable: true
                  min_value: 0
                  max_value: 100
                  value: 20
                  width: 100%
                  height: 100%
                  arc_width: 0
                  indicator:
                    arc_width: 32
                    arc_opa: 0%
                  knob:
                    bg_color: 0x444444
                    border_width: 0
                    border_opa: transp
                    pad_all: -8

              # Temperature label — centered inside the arc.
              # Fixed size so the container never clips wider text (e.g. "24.0").
              # clickable: false so touches pass through to arc_setpoint below.
              - obj:
                  align: CENTER
                  width: 300
                  height: 120
                  bg_opa: transp
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: CENTER
                    flex_align_cross: END
                  widgets:
                    - label:
                        id: temp_label
                        text: "22.0"
                        text_color: 0xF5F5F5
                        text_font: roboto_96
                    - label:
                        text: "°C"
                        text_color: 0x777777
                        text_font: roboto_32
                        pad_bottom: 16

              # Arc 4 — draggable setpoint knob (drawn last = topmost, absorbs all touch).
              # Transparent arc + invisible indicator; only the styled knob is rendered.
              # Knob border starts grey (off); apply_mode_style colours it on power-on.
              - arc:
                  id: arc_setpoint
                  adjustable: true
                  min_value: 0
                  max_value: 100
                  value: 30
                  width: 100%
                  height: 100%
                  arc_width: 0
                  indicator:
                    arc_width: 32
                    arc_opa: 0%
                  knob:
                    bg_color: 0xFFFFFF
                    border_color: 0x444444
                    border_width: 6
                    pad_all: -2
                  on_value:
                    then:
                      - lambda: |-
                          int arc_val = (int)x;
                          id(g_setpoint_arc) = arc_val;
                          // Convert arc → temperature, snapped to nearest 0.5 °C
                          float raw = arc_val / 100.0f * (id(g_temp_max) - id(g_temp_min)) + id(g_temp_min);
                          id(g_setpoint) = roundf(raw * 2.0f) / 2.0f;
                          // Direct set — no animation during drag
                          lv_arc_set_value(id(arc_track), arc_val);
                          // Diff segment: only when powered and setpoint above current
                          if (id(g_mode) != 0 && arc_val > id(g_current_arc)) {
                            lv_obj_clear_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
                            lv_arc_set_bg_start_angle(id(arc_diff),
                              (int)(135.0f + id(g_current_arc) / 100.0f * 270.0f));
                            lv_arc_set_bg_end_angle(id(arc_diff),
                              (int)(135.0f + (float)arc_val / 100.0f * 270.0f));
                          } else {
                            lv_obj_add_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
                          }
                          char buf[8];
                          snprintf(buf, sizeof(buf), "%.1f", id(g_setpoint));
                          lv_label_set_text(id(temp_label), buf);

        # ── Bottom button row ──────────────────────────────────────────────────
        # Temp minus (bottom-left, x=15)
        - button:
            id: btn_temp_minus
            x: 15
            y: 466
            width: 114
            height: 114
            radius: 57
            bg_opa: transp
            border_color: 0x2E2E2E
            border_width: 2
            pad_all: 0
            on_click:
              then:
                - lambda: |-
                    // Snapshot current visual arc position before updating globals —
                    // correct animation start even mid-animation on rapid taps
                    int32_t vis = lv_arc_get_value(id(arc_track));
                    if (id(g_setpoint) > id(g_temp_min)) {
                      id(g_setpoint) -= 0.5f;
                      if (id(g_setpoint) < id(g_temp_min)) id(g_setpoint) = id(g_temp_min);
                      id(g_setpoint_arc) = (int)((id(g_setpoint) - id(g_temp_min))
                                            / (id(g_temp_max) - id(g_temp_min)) * 100.0f);
                    }
                    int32_t tgt = id(g_setpoint_arc);
                    // Animate arc_track and arc_setpoint knob together
                    lv_anim_del(id(arc_track),    (lv_anim_exec_xcb_t)lv_arc_set_value);
                    lv_anim_del(id(arc_setpoint), (lv_anim_exec_xcb_t)lv_arc_set_value);
                    {
                      lv_anim_t a;
                      lv_anim_init(&a);
                      lv_anim_set_exec_cb(&a, (lv_anim_exec_xcb_t)lv_arc_set_value);
                      lv_anim_set_values(&a, vis, tgt);
                      lv_anim_set_time(&a, 200);
                      lv_anim_set_path_cb(&a, lv_anim_path_ease_out);
                      lv_anim_set_var(&a, id(arc_track));
                      lv_anim_start(&a);
                      lv_anim_set_var(&a, id(arc_setpoint));
                      lv_anim_start(&a);
                    }
                    // Animate arc_diff end angle in sync (only when powered)
                    int32_t cur = id(g_current_arc);
                    if (id(g_mode) != 0 && tgt > cur) {
                      lv_obj_clear_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
                      int32_t ang_from = (vis > cur) ? (int)(135.0f + vis / 100.0f * 270.0f)
                                                     : (int)(135.0f + cur / 100.0f * 270.0f);
                      int32_t ang_to   = (int)(135.0f + tgt / 100.0f * 270.0f);
                      lv_arc_set_bg_start_angle(id(arc_diff),
                        (int)(135.0f + cur / 100.0f * 270.0f));
                      lv_anim_del(id(arc_diff), (lv_anim_exec_xcb_t)lv_arc_set_bg_end_angle);
                      {
                        lv_anim_t a;
                        lv_anim_init(&a);
                        lv_anim_set_exec_cb(&a, (lv_anim_exec_xcb_t)lv_arc_set_bg_end_angle);
                        lv_anim_set_var(&a, id(arc_diff));
                        lv_anim_set_values(&a, ang_from, ang_to);
                        lv_anim_set_time(&a, 200);
                        lv_anim_set_path_cb(&a, lv_anim_path_ease_out);
                        lv_anim_start(&a);
                      }
                    } else {
                      lv_obj_add_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
                    }
                    char buf[8];
                    snprintf(buf, sizeof(buf), "%.1f", id(g_setpoint));
                    lv_label_set_text(id(temp_label), buf);
            widgets:
              - label:
                  align: CENTER
                  text: "\U000F0374"
                  text_font: mdi_36
                  text_color: 0x777777

        # Power button (bottom-center, x=168) — toggles between off and last mode
        - button:
            id: btn_power
            x: 168
            y: 466
            width: 114
            height: 114
            radius: 57
            bg_opa: transp
            border_color: 0x2E2E2E
            border_width: 2
            pad_all: 0
            on_click:
              then:
                - lambda: |-
                    if (id(g_mode) == 0) {
                      id(g_mode) = id(g_prev_mode);
                    } else {
                      id(g_prev_mode) = id(g_mode);
                      id(g_mode) = 0;
                    }
                - script.execute: apply_mode_style
            widgets:
              - label:
                  id: icon_power
                  align: CENTER
                  text: "\U000F0425"
                  text_font: mdi_36
                  text_color: 0x777777

        # Temp plus (bottom-right, x=321)
        - button:
            id: btn_temp_plus
            x: 321
            y: 466
            width: 114
            height: 114
            radius: 57
            bg_opa: transp
            border_color: 0x2E2E2E
            border_width: 2
            pad_all: 0
            on_click:
              then:
                - lambda: |-
                    // Snapshot current visual arc position before updating globals —
                    // correct animation start even mid-animation on rapid taps
                    int32_t vis = lv_arc_get_value(id(arc_track));
                    if (id(g_setpoint) < id(g_temp_max)) {
                      id(g_setpoint) += 0.5f;
                      if (id(g_setpoint) > id(g_temp_max)) id(g_setpoint) = id(g_temp_max);
                      id(g_setpoint_arc) = (int)((id(g_setpoint) - id(g_temp_min))
                                            / (id(g_temp_max) - id(g_temp_min)) * 100.0f);
                    }
                    int32_t tgt = id(g_setpoint_arc);
                    // Animate arc_track and arc_setpoint knob together
                    lv_anim_del(id(arc_track),    (lv_anim_exec_xcb_t)lv_arc_set_value);
                    lv_anim_del(id(arc_setpoint), (lv_anim_exec_xcb_t)lv_arc_set_value);
                    {
                      lv_anim_t a;
                      lv_anim_init(&a);
                      lv_anim_set_exec_cb(&a, (lv_anim_exec_xcb_t)lv_arc_set_value);
                      lv_anim_set_values(&a, vis, tgt);
                      lv_anim_set_time(&a, 200);
                      lv_anim_set_path_cb(&a, lv_anim_path_ease_out);
                      lv_anim_set_var(&a, id(arc_track));
                      lv_anim_start(&a);
                      lv_anim_set_var(&a, id(arc_setpoint));
                      lv_anim_start(&a);
                    }
                    // Animate arc_diff end angle in sync (only when powered)
                    int32_t cur = id(g_current_arc);
                    if (id(g_mode) != 0 && tgt > cur) {
                      lv_obj_clear_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
                      int32_t ang_from = (vis > cur) ? (int)(135.0f + vis / 100.0f * 270.0f)
                                                     : (int)(135.0f + cur / 100.0f * 270.0f);
                      int32_t ang_to   = (int)(135.0f + tgt / 100.0f * 270.0f);
                      lv_arc_set_bg_start_angle(id(arc_diff),
                        (int)(135.0f + cur / 100.0f * 270.0f));
                      lv_anim_del(id(arc_diff), (lv_anim_exec_xcb_t)lv_arc_set_bg_end_angle);
                      {
                        lv_anim_t a;
                        lv_anim_init(&a);
                        lv_anim_set_exec_cb(&a, (lv_anim_exec_xcb_t)lv_arc_set_bg_end_angle);
                        lv_anim_set_var(&a, id(arc_diff));
                        lv_anim_set_values(&a, ang_from, ang_to);
                        lv_anim_set_time(&a, 200);
                        lv_anim_set_path_cb(&a, lv_anim_path_ease_out);
                        lv_anim_start(&a);
                      }
                    } else {
                      lv_obj_add_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
                    }
                    char buf[8];
                    snprintf(buf, sizeof(buf), "%.1f", id(g_setpoint));
                    lv_label_set_text(id(temp_label), buf);
            widgets:
              - label:
                  align: CENTER
                  text: "\U000F0417"
                  text_font: mdi_36
                  text_color: 0x777777


# deinyon-climate-ui3.yml
# V3 — Portrait arc, dark peppermint theme, 450×600
# Requires: display id my_display, touchscreen (any platform)
# Device must be in portrait orientation (no rotation: 270°)
#
# Arc value mapping: arc_val = (temp_c - 16) / 14.0 * 100
#   16 °C → 0    22 °C → 43    30 °C → 100
# Initial state: setpoint 22 °C (arc 43), current 19 °C (arc 21)

esphome:
  on_boot:
    then:
      - lambda: |-
          // arc_current knob is for display only — block all touch on it
          lv_obj_clear_flag(id(arc_current), LV_OBJ_FLAG_CLICKABLE);
          // Button press flash: white border instant on press, ease-out decay on release
          static lv_style_prop_t _props[] = {LV_STYLE_BORDER_COLOR, LV_STYLE_PROP_INV};
          static lv_style_transition_dsc_t _t_in, _t_out;
          lv_style_transition_dsc_init(&_t_in,  _props, lv_anim_path_linear,   80,  0, NULL);
          lv_style_transition_dsc_init(&_t_out, _props, lv_anim_path_ease_out, 500, 0, NULL);
          static lv_style_t _s_pressed, _s_default;
          lv_style_init(&_s_pressed);
          lv_style_set_border_color(&_s_pressed, lv_color_hex(0xFFFFFF));
          lv_style_set_transition(&_s_pressed, &_t_in);
          lv_style_init(&_s_default);
          lv_style_set_transition(&_s_default, &_t_out);
          // btn_fan_auto and btn_power are excluded — their border colour is
          // managed manually for toggle state, so the transition would conflict.
          lv_obj_t *_btns[] = {id(btn_fan), id(btn_mode),
                                id(btn_temp_minus), id(btn_temp_plus)};
          for (int i = 0; i < 4; i++) {
            lv_obj_add_style(_btns[i], &_s_default, LV_STATE_DEFAULT);
            lv_obj_add_style(_btns[i], &_s_pressed, LV_STATE_PRESSED);
          }

globals:
  - id: g_setpoint
    type: int
    initial_value: '22'
  - id: g_setpoint_arc
    type: int
    initial_value: '43'
  - id: g_fan_auto
    type: bool
    initial_value: 'false'
  - id: g_power_on
    type: bool
    initial_value: 'false'

font:
  - file: "gfonts://Roboto"
    id: roboto_96
    size: 96
    glyphs: "0123456789"
  - file: "gfonts://Roboto"
    id: roboto_32
    size: 32
    glyphs: "°C"
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_36
    size: 36
    bpp: 4
    glyphs:
      - "\U000F0425"  # mdi:power
      - "\U000F0717"  # mdi:snowflake   (cool mode)
      - "\U000F0238"  # mdi:fire        (heat mode)
      - "\U000F0453"  # mdi:autorenew   (auto mode / fan auto)
      - "\U000F0210"  # mdi:fan         (fan speed button)
      - "\U000F0BAF"  # mdi:fan-speed-1 (low)
      - "\U000F0BB0"  # mdi:fan-speed-2 (med)
      - "\U000F0BB1"  # mdi:fan-speed-3 (high)
      - "\U000F0374"  # mdi:minus       (temp −)
      - "\U000F0417"  # mdi:plus        (temp +)

lvgl:
  displays:
    - my_display
  pages:
    - id: main_page
      bg_color: 0x000000
      widgets:

        # ── Top button row ─────────────────────────────────────────────────────
        # Fan speed button (top-left, x=15)
        - button:
            id: btn_fan
            x: 15
            y: 20
            width: 114
            height: 114
            radius: 57
            bg_opa: transp
            border_color: 0x2E2E2E
            border_width: 2
            pad_all: 0
            on_click:
              then:
                - if:
                    condition:
                      lambda: return lv_obj_has_flag(id(fan_popup), LV_OBJ_FLAG_HIDDEN);
                    then:
                      - lvgl.widget.show: fan_popup
                      - lvgl.widget.hide: mode_popup
                      - lvgl.widget.show: popup_backdrop
                    else:
                      - lvgl.widget.hide: fan_popup
                      - lvgl.widget.hide: popup_backdrop
            widgets:
              - label:
                  id: icon_fan
                  align: CENTER
                  text: "\U000F0210"
                  text_font: mdi_36
                  text_color: 0x777777

        # Fan auto toggle (x=141) — highlights peppermint when active
        - button:
            id: btn_fan_auto
            x: 141
            y: 20
            width: 114
            height: 114
            radius: 57
            bg_opa: transp
            border_color: 0x2E2E2E
            border_width: 2
            pad_all: 0
            on_click:
              then:
                - lambda: |-
                    id(g_fan_auto) = !id(g_fan_auto);
                    if (id(g_fan_auto)) {
                      lv_obj_set_style_border_color(id(btn_fan_auto), lv_color_hex(0x00D9A3), LV_STATE_DEFAULT);
                      lv_obj_set_style_text_color(id(icon_fan_auto), lv_color_hex(0x00D9A3), LV_STATE_DEFAULT);
                    } else {
                      lv_obj_set_style_border_color(id(btn_fan_auto), lv_color_hex(0x2E2E2E), LV_STATE_DEFAULT);
                      lv_obj_set_style_text_color(id(icon_fan_auto), lv_color_hex(0x777777), LV_STATE_DEFAULT);
                    }
            widgets:
              - label:
                  id: icon_fan_auto
                  align: CENTER
                  text: "\U000F0453"
                  text_font: mdi_36
                  text_color: 0x777777

        # Mode button (top-right, x=321) — icon updates to selected mode
        - button:
            id: btn_mode
            x: 321
            y: 20
            width: 114
            height: 114
            radius: 57
            bg_opa: transp
            border_color: 0x2E2E2E
            border_width: 2
            pad_all: 0
            on_click:
              then:
                - if:
                    condition:
                      lambda: return lv_obj_has_flag(id(mode_popup), LV_OBJ_FLAG_HIDDEN);
                    then:
                      - lvgl.widget.show: mode_popup
                      - lvgl.widget.hide: fan_popup
                      - lvgl.widget.show: popup_backdrop
                    else:
                      - lvgl.widget.hide: mode_popup
                      - lvgl.widget.hide: popup_backdrop
            widgets:
              - label:
                  id: icon_mode
                  align: CENTER
                  text: "\U000F0717"
                  text_font: mdi_36
                  text_color: 0x777777

        # ── Arc area: 300×300, centered horizontally at y=150 ─────────────────
        # All 3 arcs share the same container and geometry (100% × 100%).
        - obj:
            align: TOP_MID
            y: 155
            width: 330
            height: 330
            bg_opa: transp
            border_width: 0
            pad_all: 0
            scrollable: false
            widgets:

              # Arc 1 — dark-gray track + peppermint setpoint fill
              # indicator fills from 0° to the setpoint arc value
              - arc:
                  id: arc_track
                  adjustable: false
                  min_value: 0
                  max_value: 100
                  value: 43
                  width: 100%
                  height: 100%
                  arc_color: 0x1A1A1A
                  arc_width: 32
                  indicator:
                    arc_color: 0x006B50
                    arc_width: 32
                  knob:
                    bg_opa: transp
                    border_opa: transp

              # Arc 2 — bright peppermint diff segment (current → setpoint gap)
              # Trick: arc_width=0 hides the BG ring; only indicator shows.
              # start_angle/end_angle constrain the window; value=100 fills it.
              - arc:
                  id: arc_diff
                  adjustable: false
                  hidden: false
                  min_value: 0
                  max_value: 100
                  value: 100
                  start_angle: 192
                  end_angle: 251
                  width: 100%
                  height: 100%
                  arc_width: 0
                  indicator:
                    arc_color: 0x00D9A3
                    arc_width: 32
                  knob:
                    bg_opa: transp
                    border_opa: transp

              # Arc 3 — current temperature dot marker (not interactive)
              # adjustable: true required for LVGL to keep knob styled.
              # LV_OBJ_FLAG_CLICKABLE cleared on boot so it won't capture touch.
              - arc:
                  id: arc_current
                  adjustable: true
                  min_value: 0
                  max_value: 100
                  value: 21
                  width: 100%
                  height: 100%
                  arc_width: 0
                  indicator:
                    arc_width: 32
                    arc_opa: 0%
                  knob:
                    bg_color: 0x444444
                    border_width: 0
                    border_opa: transp
                    pad_all: -8

              # Temperature label — centered inside the arc.
              # clickable: false so touches pass through to arc_setpoint below.
              - obj:
                  align: CENTER
                  bg_opa: transp
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: CENTER
                    flex_align_cross: END
                  widgets:
                    - label:
                        id: temp_label
                        text: "22"
                        text_color: 0xF5F5F5
                        text_font: roboto_96
                    - label:
                        text: "°C"
                        text_color: 0x777777
                        text_font: roboto_32
                        pad_bottom: 16

              # Arc 4 — draggable setpoint knob (drawn last = topmost, absorbs all touch)
              # Transparent arc + invisible indicator; only the white knob is rendered.
              - arc:
                  id: arc_setpoint
                  adjustable: true
                  min_value: 0
                  max_value: 100
                  value: 43
                  width: 100%
                  height: 100%
                  arc_width: 0
                  indicator:
                    arc_width: 32
                    arc_opa: 0%
                  knob:
                    bg_color: 0xFFFFFF
                    border_color: 0x00D9A3
                    border_width: 6
                    pad_all: -2
                  on_value:
                    then:
                      - lambda: |-
                          int arc_val = (int)x;
                          id(g_setpoint_arc) = arc_val;
                          id(g_setpoint) = (int)roundf(arc_val / 100.0f * 14.0f + 16.0f);
                          // Direct set — no animation during drag
                          lv_arc_set_value(id(arc_track), arc_val);
                          if (arc_val > 21) {
                            lv_obj_clear_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
                            lv_arc_set_bg_start_angle(id(arc_diff), (int)(135.0f + 21.0f / 100.0f * 270.0f));
                            lv_arc_set_bg_end_angle(id(arc_diff), (int)(135.0f + (float)arc_val / 100.0f * 270.0f));
                          } else {
                            lv_obj_add_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
                          }
                          char buf[4];
                          snprintf(buf, sizeof(buf), "%d", id(g_setpoint));
                          lv_label_set_text(id(temp_label), buf);

        # ── Bottom button row ──────────────────────────────────────────────────
        # Temp minus (bottom-left, x=15)
        - button:
            id: btn_temp_minus
            x: 15
            y: 466
            width: 114
            height: 114
            radius: 57
            bg_opa: transp
            border_color: 0x2E2E2E
            border_width: 2
            pad_all: 0
            on_click:
              then:
                - lambda: |-
                    // Snapshot current visual arc position before updating globals —
                    // this is the correct animation start even mid-animation on rapid taps
                    int32_t vis = lv_arc_get_value(id(arc_track));
                    if (id(g_setpoint) > 16) {
                      id(g_setpoint) -= 1;
                      id(g_setpoint_arc) = (int)((id(g_setpoint) - 16.0f) / 14.0f * 100.0f);
                    }
                    int32_t tgt = id(g_setpoint_arc);
                    // Animate arc_track and arc_setpoint knob together
                    lv_anim_del(id(arc_track),   (lv_anim_exec_xcb_t)lv_arc_set_value);
                    lv_anim_del(id(arc_setpoint), (lv_anim_exec_xcb_t)lv_arc_set_value);
                    {
                      lv_anim_t a;
                      lv_anim_init(&a);
                      lv_anim_set_exec_cb(&a, (lv_anim_exec_xcb_t)lv_arc_set_value);
                      lv_anim_set_values(&a, vis, tgt);
                      lv_anim_set_time(&a, 200);
                      lv_anim_set_path_cb(&a, lv_anim_path_ease_out);
                      lv_anim_set_var(&a, id(arc_track));
                      lv_anim_start(&a);
                      lv_anim_set_var(&a, id(arc_setpoint));
                      lv_anim_start(&a);
                    }
                    // Animate arc_diff end angle in sync (start from visual position)
                    if (tgt > 21) {
                      lv_obj_clear_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
                      int32_t ang_from = (vis > 21) ? (int)(135.0f + vis / 100.0f * 270.0f)
                                                    : (int)(135.0f + 21.0f / 100.0f * 270.0f);
                      int32_t ang_to   = (int)(135.0f + tgt / 100.0f * 270.0f);
                      lv_arc_set_bg_start_angle(id(arc_diff), (int)(135.0f + 21.0f / 100.0f * 270.0f));
                      lv_anim_del(id(arc_diff), (lv_anim_exec_xcb_t)lv_arc_set_bg_end_angle);
                      {
                        lv_anim_t a;
                        lv_anim_init(&a);
                        lv_anim_set_exec_cb(&a, (lv_anim_exec_xcb_t)lv_arc_set_bg_end_angle);
                        lv_anim_set_var(&a, id(arc_diff));
                        lv_anim_set_values(&a, ang_from, ang_to);
                        lv_anim_set_time(&a, 200);
                        lv_anim_set_path_cb(&a, lv_anim_path_ease_out);
                        lv_anim_start(&a);
                      }
                    } else {
                      lv_obj_add_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
                    }
                    char buf[4];
                    snprintf(buf, sizeof(buf), "%d", id(g_setpoint));
                    lv_label_set_text(id(temp_label), buf);
            widgets:
              - label:
                  align: CENTER
                  text: "\U000F0374"
                  text_font: mdi_36
                  text_color: 0x777777

        # Power button (bottom-center, x=168) — toggles AC on/off
        - button:
            id: btn_power
            x: 168
            y: 466
            width: 114
            height: 114
            radius: 57
            bg_opa: transp
            border_color: 0x2E2E2E
            border_width: 2
            pad_all: 0
            on_click:
              then:
                - lambda: |-
                    id(g_power_on) = !id(g_power_on);
                    if (id(g_power_on)) {
                      lv_obj_set_style_border_color(id(btn_power), lv_color_hex(0x00D9A3), LV_STATE_DEFAULT);
                      lv_obj_set_style_text_color(id(icon_power), lv_color_hex(0x00D9A3), LV_STATE_DEFAULT);
                    } else {
                      lv_obj_set_style_border_color(id(btn_power), lv_color_hex(0x2E2E2E), LV_STATE_DEFAULT);
                      lv_obj_set_style_text_color(id(icon_power), lv_color_hex(0x777777), LV_STATE_DEFAULT);
                    }
            widgets:
              - label:
                  id: icon_power
                  align: CENTER
                  text: "\U000F0425"
                  text_font: mdi_36
                  text_color: 0x777777

        # Temp plus (bottom-right, x=321)
        - button:
            id: btn_temp_plus
            x: 321
            y: 466
            width: 114
            height: 114
            radius: 57
            bg_opa: transp
            border_color: 0x2E2E2E
            border_width: 2
            pad_all: 0
            on_click:
              then:
                - lambda: |-
                    // Snapshot current visual arc position before updating globals —
                    // this is the correct animation start even mid-animation on rapid taps
                    int32_t vis = lv_arc_get_value(id(arc_track));
                    if (id(g_setpoint) < 30) {
                      id(g_setpoint) += 1;
                      id(g_setpoint_arc) = (int)((id(g_setpoint) - 16.0f) / 14.0f * 100.0f);
                    }
                    int32_t tgt = id(g_setpoint_arc);
                    // Animate arc_track and arc_setpoint knob together
                    lv_anim_del(id(arc_track),   (lv_anim_exec_xcb_t)lv_arc_set_value);
                    lv_anim_del(id(arc_setpoint), (lv_anim_exec_xcb_t)lv_arc_set_value);
                    {
                      lv_anim_t a;
                      lv_anim_init(&a);
                      lv_anim_set_exec_cb(&a, (lv_anim_exec_xcb_t)lv_arc_set_value);
                      lv_anim_set_values(&a, vis, tgt);
                      lv_anim_set_time(&a, 200);
                      lv_anim_set_path_cb(&a, lv_anim_path_ease_out);
                      lv_anim_set_var(&a, id(arc_track));
                      lv_anim_start(&a);
                      lv_anim_set_var(&a, id(arc_setpoint));
                      lv_anim_start(&a);
                    }
                    // Animate arc_diff end angle in sync (start from visual position)
                    if (tgt > 21) {
                      lv_obj_clear_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
                      int32_t ang_from = (vis > 21) ? (int)(135.0f + vis / 100.0f * 270.0f)
                                                    : (int)(135.0f + 21.0f / 100.0f * 270.0f);
                      int32_t ang_to   = (int)(135.0f + tgt / 100.0f * 270.0f);
                      lv_arc_set_bg_start_angle(id(arc_diff), (int)(135.0f + 21.0f / 100.0f * 270.0f));
                      lv_anim_del(id(arc_diff), (lv_anim_exec_xcb_t)lv_arc_set_bg_end_angle);
                      {
                        lv_anim_t a;
                        lv_anim_init(&a);
                        lv_anim_set_exec_cb(&a, (lv_anim_exec_xcb_t)lv_arc_set_bg_end_angle);
                        lv_anim_set_var(&a, id(arc_diff));
                        lv_anim_set_values(&a, ang_from, ang_to);
                        lv_anim_set_time(&a, 200);
                        lv_anim_set_path_cb(&a, lv_anim_path_ease_out);
                        lv_anim_start(&a);
                      }
                    } else {
                      lv_obj_add_flag(id(arc_diff), LV_OBJ_FLAG_HIDDEN);
                    }
                    char buf[4];
                    snprintf(buf, sizeof(buf), "%d", id(g_setpoint));
                    lv_label_set_text(id(temp_label), buf);
            widgets:
              - label:
                  align: CENTER
                  text: "\U000F0417"
                  text_font: mdi_36
                  text_color: 0x777777

        # ── Popup backdrop ─────────────────────────────────────────────────────
        # Transparent full-screen layer sitting above the main UI but below both
        # popup panels. When a popup is open this catches any tap outside it.
        # z-order: listed here (after bottom buttons, before popups) ensures
        # popups render on top of it.
        - obj:
            id: popup_backdrop
            hidden: true
            x: 0
            y: 0
            width: 450
            height: 600
            bg_opa: transp
            border_width: 0
            pad_all: 0
            on_click:
              then:
                - lvgl.widget.hide: fan_popup
                - lvgl.widget.hide: mode_popup
                - lvgl.widget.hide: popup_backdrop

        # ── Fan speed popup — list style (icon left, label right) ─────────────
        - obj:
            id: fan_popup
            hidden: true
            x: 0
            y: 134
            width: 220
            height: 270
            radius: 12
            border_width: 1
            border_color: 0x2E2E2E
            bg_color: 0x0D0D0D
            pad_all: 0
            scrollable: false
            widgets:
              - button:
                  id: btn_fan_low
                  x: 0
                  y: 0
                  width: 220
                  height: 90
                  radius: 0
                  bg_opa: transp
                  border_width: 0
                  pad_all: 0
                  on_click:
                    then:
                      - lvgl.widget.hide: fan_popup
                      - lambda: |-
                          lv_obj_add_flag(id(popup_backdrop), LV_OBJ_FLAG_HIDDEN);
                          lv_label_set_text(id(icon_fan), "\U000F0BAF");
                          lv_obj_set_style_text_color(id(icon_fan), lv_color_hex(0x00D9A3), LV_STATE_DEFAULT);
                          lv_obj_set_style_border_color(id(btn_fan), lv_color_hex(0x00D9A3), LV_STATE_DEFAULT);
                  widgets:
                    - label:
                        align: LEFT_MID
                        x: 18
                        text: "\U000F0BAF"
                        text_font: mdi_36
                        text_color: 0x00D9A3
                    - label:
                        align: LEFT_MID
                        x: 70
                        text: "Low"
                        text_font: montserrat_18
                        text_color: 0xDDDDDD
              - obj:
                  x: 0
                  y: 90
                  width: 220
                  height: 1
                  bg_color: 0x2E2E2E
                  border_width: 0
                  pad_all: 0
              - button:
                  id: btn_fan_med
                  x: 0
                  y: 91
                  width: 220
                  height: 89
                  radius: 0
                  bg_opa: transp
                  border_width: 0
                  pad_all: 0
                  on_click:
                    then:
                      - lvgl.widget.hide: fan_popup
                      - lambda: |-
                          lv_obj_add_flag(id(popup_backdrop), LV_OBJ_FLAG_HIDDEN);
                          lv_label_set_text(id(icon_fan), "\U000F0BB0");
                          lv_obj_set_style_text_color(id(icon_fan), lv_color_hex(0x00D9A3), LV_STATE_DEFAULT);
                          lv_obj_set_style_border_color(id(btn_fan), lv_color_hex(0x00D9A3), LV_STATE_DEFAULT);
                  widgets:
                    - label:
                        align: LEFT_MID
                        x: 18
                        text: "\U000F0BB0"
                        text_font: mdi_36
                        text_color: 0x00D9A3
                    - label:
                        align: LEFT_MID
                        x: 70
                        text: "Med"
                        text_font: montserrat_18
                        text_color: 0xDDDDDD
              - obj:
                  x: 0
                  y: 180
                  width: 220
                  height: 1
                  bg_color: 0x2E2E2E
                  border_width: 0
                  pad_all: 0
              - button:
                  id: btn_fan_high
                  x: 0
                  y: 181
                  width: 220
                  height: 89
                  radius: 0
                  bg_opa: transp
                  border_width: 0
                  pad_all: 0
                  on_click:
                    then:
                      - lvgl.widget.hide: fan_popup
                      - lambda: |-
                          lv_obj_add_flag(id(popup_backdrop), LV_OBJ_FLAG_HIDDEN);
                          lv_label_set_text(id(icon_fan), "\U000F0BB1");
                          lv_obj_set_style_text_color(id(icon_fan), lv_color_hex(0x00D9A3), LV_STATE_DEFAULT);
                          lv_obj_set_style_border_color(id(btn_fan), lv_color_hex(0x00D9A3), LV_STATE_DEFAULT);
                  widgets:
                    - label:
                        align: LEFT_MID
                        x: 18
                        text: "\U000F0BB1"
                        text_font: mdi_36
                        text_color: 0x00D9A3
                    - label:
                        align: LEFT_MID
                        x: 70
                        text: "High"
                        text_font: montserrat_18
                        text_color: 0xDDDDDD

        # ── Mode popup — list style (icon left, label right) ───────────────────
        - obj:
            id: mode_popup
            hidden: true
            x: 230
            y: 134
            width: 220
            height: 270
            radius: 12
            border_width: 1
            border_color: 0x2E2E2E
            bg_color: 0x0D0D0D
            pad_all: 0
            scrollable: false
            widgets:
              - button:
                  id: btn_cool
                  x: 0
                  y: 0
                  width: 220
                  height: 90
                  radius: 0
                  bg_opa: transp
                  border_width: 0
                  pad_all: 0
                  on_click:
                    then:
                      - lvgl.widget.hide: mode_popup
                      - lambda: |-
                          lv_obj_add_flag(id(popup_backdrop), LV_OBJ_FLAG_HIDDEN);
                          lv_label_set_text(id(icon_mode), "\U000F0717");
                          lv_obj_set_style_text_color(id(icon_mode), lv_color_hex(0x00D9A3), LV_STATE_DEFAULT);
                          lv_obj_set_style_border_color(id(btn_mode), lv_color_hex(0x00D9A3), LV_STATE_DEFAULT);
                  widgets:

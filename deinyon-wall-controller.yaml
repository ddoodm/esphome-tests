# AC Wall Controller
# Waveshare ESP32-P4-WIFI6-Touch-LCD-7B (1024×600 MIPI-DSI IPS, GT911 touch)
# Hosts the Actron B812 climate AND its own LVGL UI (rotated to vertical = 600×1024).
#
# Hardware blocks copied from waveshare-p4-7.yaml; the only deviation is LVGL
# rotation, which is owned by the UI package below.
#
# UI is split into a separate package for iteration: deinyon-wall-controller-ui.yml

substitutions:
  name: ac-wall-controller
  friendly_name: "AC Wall Controller"

  # ── Climate config ──────────────────────────────────────────────────────────
  # IDs referenced by the UI package — keep in sync with the UI substitutions.
  ac_climate_id: ac_climate
  ac_min_temp: "16.0"
  ac_max_temp: "30.0"

  # ── Sensor source indices (used by the active_temp template + select) ──────
  sensor_main:    "0"
  sensor_desk:    "1"
  sensor_bedroom: "2"
  sensor_average: "3"

  # ── Home Assistant entity IDs ──────────────────────────────────────────────
  ha_desk_temp:    sensor.desk_temp_sensor_atc_a199_temperature
  ha_bedroom_temp: sensor.bedroom_temp_sensor_atc_dd1b_temperature
  ha_weather:      weather.forecast_home

external_components:
  # Local overrides that add XRGB8888 / LV_COLOR_DEPTH=32 support to the
  # display, lvgl, and mipi_dsi components. See components/ directory.
  - source:
      type: local
      path: components
    components: [display, image, lvgl, mipi_dsi]
  - source: github://ddoodm/esphome-actron-b812@main
    components: [actron_b812]

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.4.0

# ── Chip ──────────────────────────────────────────────────────────────────────
# The P4 needs PSRAM execution + experimental IDF features for MIPI-DSI + LVGL.
#
# sdkconfig_options notes — keep these in sync with the crash investigation:
#   CONFIG_LV_DRAW_BUF_ALIGN=64
#     LVGL 9.x's PPA fill path on the P4 requires draw buffers aligned to the
#     64-byte cache line. Without this, PPA DMA writes can clobber adjacent
#     memory and the next dispatch through a corrupted function pointer faults
#     as "Instruction address misaligned". The ESPHome crash dumper then
#     reports the idle core's `esp_cpu_wait_for_intr` PC, which is misleading.
#   CONFIG_ESP_TASK_WDT_TIMEOUT_S=30
#     The default 5 s WDT trips inside lv_timer_handler() when a heavy first
#     redraw of the new widget tree happens. We render this UI infrequently
#     (only when climate state changes), so a longer WDT is acceptable as
#     headroom and doesn't mask genuinely stuck tasks for very long.
# We deliberately DO NOT disable PPA — software fills are too slow for this
# widget tree on a 600×1024 panel and tripped the WDT outright.
esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  flash_size: 32MB
  cpu_frequency: 360MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LV_DRAW_BUF_ALIGN: "64"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
    advanced:
      execute_from_psram: true
      enable_idf_experimental_features: true

# HEX-mode PSRAM at 200 MHz is required for the MIPI-DSI frame buffer.
psram:
  mode: hex
  speed: 200MHz

# Powers the MIPI-DSI PHY. Display will not initialise without it.
esp_ldo:
  - voltage: 2.5V
    channel: 3

preferences:
  flash_write_interval: 5min

logger:
  level: DEBUG
  hardware_uart: UART0
  logs:
    lvgl: INFO

# ── C6 hosted WiFi coprocessor (SDIO) ─────────────────────────────────────────
# The C6 handles all WiFi; the P4 talks to it over SDIO via esp32_hosted.
# Pin map confirmed against the 7B schematic.
esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  active_high: true
  clk_pin: GPIO18
  cmd_pin: GPIO19
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17

# Required for the C6 firmware OTA updater below.
http_request:

# Keeps the C6's ESP-Hosted firmware in sync with the version ESPHome expects.
update:
  - platform: esp32_hosted
    name: "ESP-Hosted Firmware"
    icon: mdi:chip
    type: http
    source: https://esphome.github.io/esp-hosted-firmware/manifest/esp32c6.json
    update_interval: 6h

api:

ota:
  - platform: esphome

# ── Network ───────────────────────────────────────────────────────────────────
# Tuned for the hosted-C6 WiFi stack (see waveshare-p4-7.yaml for rationale).
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  fast_connect: true
  enable_btm: false
  enable_rrm: false
  ap:
    ssid: "${friendly_name}"

network:
  enable_ipv6: false

time:
  - platform: homeassistant
    id: ha_time

# ── AC transmitter ────────────────────────────────────────────────────────────
# NOTE: GPIO6 carried over from the S3 wall controller — verify on the P4 wiring.
remote_transmitter:
  id: ac_tx
  pin: GPIO3
  carrier_duty_percent: 100%

# ── I²C ───────────────────────────────────────────────────────────────────────
# Shared bus on the P4 7B: GT911 touch (0x5D/0x14), audio codec, optional SHT4x.
i2c:
  - id: bus_a
    sda: GPIO7
    scl: GPIO8
    frequency: 400kHz
    scan: true

# ── Sensors ───────────────────────────────────────────────────────────────────
sensor:
  # External SHT41 on bus_a — "Main" room temp/humidity sensor.
  # (No onboard SHT4x on the P4 7B; remove this block if not wired.)
  - platform: sht4x
    i2c_id: bus_a
    address: 0x44
    update_interval: 10s
    temperature:
      id: main_temp
      name: "Main Temperature"
      accuracy_decimals: 2
      on_value:
        then:
          - script.execute:
              id: maybe_update_active_temp
              sensor_index: ${sensor_main}
          - script.execute: update_sensor_list
    humidity:
      id: main_humidity
      name: "Main Humidity"
      accuracy_decimals: 1

  # Pulled from Home Assistant
  - platform: homeassistant
    id: desk_temp
    entity_id: ${ha_desk_temp}
    accuracy_decimals: 2
    on_value:
      then:
        - script.execute:
            id: maybe_update_active_temp
            sensor_index: ${sensor_desk}
        - script.execute: update_sensor_list

  - platform: homeassistant
    id: bedroom_temp
    entity_id: ${ha_bedroom_temp}
    accuracy_decimals: 2
    on_value:
      then:
        - script.execute:
            id: maybe_update_active_temp
            sensor_index: ${sensor_bedroom}
        - script.execute: update_sensor_list

  # Outdoor temp from the weather entity's `temperature` attribute
  - platform: homeassistant
    id: outdoor_temp
    entity_id: ${ha_weather}
    attribute: temperature
    accuracy_decimals: 1

  # The sensor that's actually wired into the climate's thermostat.
  # Re-renders whenever maybe_update_active_temp triggers it.
  - platform: template
    id: active_temp
    name: "Active Temperature"
    lambda: |-
      switch (id(active_sensor_idx)) {
        case ${sensor_main}:    return id(main_temp).state;
        case ${sensor_desk}:    return id(desk_temp).state;
        case ${sensor_bedroom}: return id(bedroom_temp).state;
        default: { // average — sum non-NaN sensors
          float sum = 0; int count = 0;
          auto add = [&](float v) { if (!std::isnan(v)) { sum += v; count++; } };
          add(id(main_temp).state);
          add(id(desk_temp).state);
          add(id(bedroom_temp).state);
          if (count == 0) return NAN;
          return sum / count;
        }
      }
    update_interval: never

  - platform: wifi_signal
    id: wifi_signal_db
    update_interval: 30s
    internal: true

text_sensor:
  # State of the weather entity (e.g. "sunny", "cloudy", "rainy")
  - platform: homeassistant
    id: outdoor_condition
    entity_id: ${ha_weather}

  - platform: wifi_info
    ip_address:
      id: wifi_ip
      internal: true

# ── Active sensor selection ──────────────────────────────────────────────────
# Restored across reboots so the device boots with the last-used sensor.
globals:
  - id: active_sensor_idx
    type: int
    restore_value: true
    initial_value: ${sensor_main}

script:
  # Only re-render active_temp if the changed sensor is the one being used
  # (or if we're in average mode, where every sensor change matters).
  - id: maybe_update_active_temp
    parameters:
      sensor_index: int
    then:
      - if:
          condition:
            lambda: |-
              return id(active_sensor_idx) == sensor_index
                  || id(active_sensor_idx) == ${sensor_average};
          then:
            - component.update: active_temp

# Exposed to HA so source can be changed from either side.
# UI side-panel buttons call select.set on this.
select:
  - platform: template
    name: "Thermostat Sensor"
    id: thermostat_sensor_select
    optimistic: true
    restore_value: true
    options:
      - "Main"
      - "Desk"
      - "Bedroom"
      - "Average"
    initial_option: "Main"
    set_action:
      - globals.set:
          id: active_sensor_idx
          value: !lambda |-
            if (x == "Main")    return ${sensor_main};
            if (x == "Desk")    return ${sensor_desk};
            if (x == "Bedroom") return ${sensor_bedroom};
            return ${sensor_average};
      - component.update: active_temp
      # Notify the UI so it can re-render highlights + the small current temp readout
      - script.execute: on_active_sensor_changed

# ── Climate ───────────────────────────────────────────────────────────────────
climate:
  - platform: actron_b812
    id: ${ac_climate_id}
    name: "Aircon"
    transmitter_id: ac_tx
    temperature_sensor_id: active_temp
    hysteresis: 0.2
    auto_deadband: 1.0
    auto_deadband_timeout: 20min
    compressor_cooldown: 4min
    valve_settle_time: 40s
    time_id: ha_time
    # Fire the UI's action-style refresh whenever climate state changes — this
    # tracks the `action` enum (HEATING/COOLING/FAN/IDLE/OFF) directly rather
    # than the verbose substates published by the `state` text sensor.
    on_state:
      then:
        # sync_climate_to_ui mirrors climate state into the UI globals and
        # snap-redraws the arc. on_hvac_action_changed handles the action-enum
        # crossfade + status label.
        - script.execute: sync_climate_to_ui
        - script.execute: on_hvac_action_changed
        - script.execute: update_status_bar
    compressor_running:
      id: ac_compressor_running
      name: "Aircon Compressor Running"
    state:
      id: ac_state
      name: "Aircon State"
    thermostat_direction:
      id: ac_thermostat_direction
      name: "Aircon Thermostat Direction"
      on_value:
        then:
          # Auto-mode direction (cool/heat/idle) — drives diff-arc orientation
          - script.execute: on_thermostat_direction_changed
    protection_expires_at:
      id: ac_protection_at
      name: "Aircon Protection Expires At"
    deadband_active:
      name: "Aircon Deadband Active"
    deadband_expires_at:
      name: "Aircon Deadband Expires At"
    reversing_valve:
      id: ac_reversing_valve
      name: "Aircon Reversing Valve"
    call_active:
      id: ac_call_active
      name: "Aircon Call Active"
    zone_1:
      name: "Aircon Zone 1"
    zone_2:
      name: "Aircon Zone 2"

# ── Backlight ─────────────────────────────────────────────────────────────────
# GPIO32 is active-low on the 7B, so the LEDC output is inverted.
output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO32
    inverted: true
    frequency: 1000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "Display Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

# ── Display (MIPI DSI) ────────────────────────────────────────────────────────
# Panel native is 1024×600 landscape; LVGL handles rotation (see UI package).
display:
  - platform: mipi_dsi
    id: my_display
    model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B
    reset_pin:
      number: 33
    # pixel_mode is dead code in the driver (only logged); omit it.
    color_depth: 24   # DPI framebuffer = RGB888; LVGL renders XRGB8888 (32-bit) and the driver strips X
    color_order: rgb  # Waveshare 7B panel is RGB order
    dimensions:
      width: 1024
      height: 600
    update_interval: never
    auto_clear_enabled: false

# ── Touchscreen (GT911) ───────────────────────────────────────────────────────
# The 7B has no GT911 interrupt line wired — reset only.
#
# Coordinate spaces — read this before changing the transform:
#
#   The touchscreen component is rotation-unaware. It always scales its output
#   to display_width × display_height — for this MIPI-DSI panel that's the
#   native landscape 1024 × 600. So touch.x ∈ [0, 1024] and touch.y ∈ [0, 600]
#   regardless of any `calibration:` you set; no calibration value can lift
#   the y cap above 600 because display_height_ = 600.
#
#   LVGL renders portrait (rotation: 270 → logical 600 × 1024). Its touch
#   listener (LVTouchListener in lvgl_esphome.cpp) ALWAYS calls
#   rotate_coordinates() on the touchscreen output to map it into LVGL's
#   logical portrait space. For ROTATION_270 that's:
#       lvgl_x = display_native_height - touch.y - 1   = 599 - touch.y
#       lvgl_y = touch.x
#
#   So for LVGL hit-testing to land on the right widget, the touchscreen MUST
#   produce LANDSCAPE-NATIVE coordinates that match the physical panel — NOT
#   pre-rotated portrait coords. If you "fix" the axis directions here by
#   pre-rotating with swap_xy on the touchscreen, LVGL will rotate again and
#   buttons will respond from the wrong corner even if the visual dot looks
#   right.
#
#   The corollary: anything in this lambda using touch.x/touch.y directly to
#   position an LVGL widget must do the same 599-touch.y / touch.x rotation
#   by hand, because LVGL widget coords are in post-rotation logical space.
#
# Transform order (read from esphome/components/touchscreen/touchscreen.cpp;
# the docs page is misleading about this): swap_xy → normalize (mirror is
# folded into normalize as invert_x/y) → scale to display dimensions.
#
# This panel's GT911 wiring: raw_x = 0 is at the landscape RIGHT edge and
# raw_y = 0 is at the landscape BOTTOM edge (verified from tap-corner raw
# values). So both axes need inverting to produce landscape-native output;
# no swap is required because the GT911 long axis (raw_x, 0..1023) already
# matches the panel long axis (landscape X, 0..1024).
touchscreen:
  - platform: gt911
    id: my_touch
    i2c_id: bus_a
    reset_pin: GPIO23
    update_interval: 50ms
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: true
    # No `calibration:`: the GT911 auto-reads its raw maxes from the chip in
    # GT911Touchscreen::setup_internal_, which is exactly what we want.
    on_touch:
      - script.execute: screen_wake

# ── UI ────────────────────────────────────────────────────────────────────────
packages:
  ui: !include deinyon-wall-controller-ui.yml
